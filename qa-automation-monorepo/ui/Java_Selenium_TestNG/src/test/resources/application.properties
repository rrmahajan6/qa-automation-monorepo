# =============================================
# Automation Framework Configuration
# =============================================

# ============= BROWSER CONFIGURATION =============
# Browser type: chrome, firefox, edge, safari
browser=chrome

# Headless mode: true/false
headless=false

# Base URL for application under test
base.url=https://rahulshettyacademy.com/client/#/auth/login

# ============= TIMEOUT CONFIGURATION =============
# Page load timeout in seconds
page.load.timeout=30

# Implicit wait in seconds
implicit.wait=10

# Explicit wait in seconds
explicit.wait=20

# Polling interval in milliseconds
polling.interval=500

# ============= TEST EXECUTION CONFIGURATION =============
# Maximum retry attempts for failed tests
max.retries=2

# Take screenshots on test failure
take.screenshots=true

# Capture page source on test failure
capture.page.source=true

# Report directory path
report.path=test-results/

# Parallel execution: true/false
parallel.execution=true

# Number of threads for parallel execution
thread.count=4

# ============= LOGGING CONFIGURATION =============
# Log level: DEBUG, INFO, WARN, ERROR
log.level=INFO

# ============= DATABASE CONFIGURATION (Optional) =============
# Enable/disable DB integration
db.enabled=true

# MySQL JDBC URL format: jdbc:mysql://host:port/database
db.url=jdbc:mysql://localhost:3306/userdata
db.username=root
db.password=test1234
db.connection.timeout.seconds=10

# Tables to clean before test execution (comma-separated, in order to respect foreign keys)
# Order matters: child tables first, then parent tables
# Example: db.cleanup.tables=order_items,orders,cart_items,cart,users,products
db.cleanup.tables=order_items,orders,cart_items,cart,users
