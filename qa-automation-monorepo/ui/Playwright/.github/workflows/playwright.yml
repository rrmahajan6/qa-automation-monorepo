name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'qa'
        type: choice
        options: [ dev, qa, staging, prod ]
      suite:
        description: 'Test suite to run'
        required: true
        default: 'regression'
        type: choice
        options: [ smoke, regression, all ]

env:
  NODE_VERSION: 'lts/*'

jobs:
  # ─────────────────────────────────────────────
  # Smoke tests — gate for any further execution
  # ─────────────────────────────────────────────
  smoke:
    name: Smoke Tests (${{ github.event.inputs.environment || 'qa' }})
    timeout-minutes: 30
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.suite != 'regression' }}
    environment: ${{ github.event.inputs.environment || 'qa' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:smoke -- --grep @smoke
        env:
          CI: true
          ENV: ${{ github.event.inputs.environment || 'qa' }}
          HEADLESS: true
          AZURE_KEYVAULT_NAME: ${{ secrets.AZURE_KEYVAULT_NAME }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Upload smoke test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: smoke-report-${{ github.event.inputs.environment || 'qa' }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # ─────────────────────────────────────────────
  # Full regression — runs after smoke passes
  # ─────────────────────────────────────────────
  regression:
    name: Regression Tests (${{ github.event.inputs.environment || 'qa' }})
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ always() && (github.event.inputs.suite == 'regression' || github.event.inputs.suite == 'all' || github.event.inputs.suite == '') }}
    environment: ${{ github.event.inputs.environment || 'qa' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run regression tests
        run: npm run test:regression
        env:
          CI: true
          ENV: ${{ github.event.inputs.environment || 'qa' }}
          HEADLESS: true
          AZURE_KEYVAULT_NAME: ${{ secrets.AZURE_KEYVAULT_NAME }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Publish JUnit results
        uses: dorny/test-reporter@v1
        if: ${{ !cancelled() }}
        with:
          name: Playwright JUnit Report
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: regression-report-${{ github.event.inputs.environment || 'qa' }}
          path: |
            playwright-report/
            test-results/results.json
            test-results/junit.xml
            logs/
          retention-days: 30

      - name: Upload failure screenshots/videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-artifacts-${{ github.run_id }}
          path: |
            test-results/**/*.png
            test-results/**/*.webm
            test-results/**/*.zip
          retention-days: 7
