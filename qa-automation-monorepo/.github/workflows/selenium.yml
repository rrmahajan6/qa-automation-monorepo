name: Selenium Java CI

on:
  push:
    paths:
      - 'ui/selenium-java/**'
      - '.github/workflows/selenium.yml'
  pull_request:
    paths:
      - 'ui/selenium-java/**'
      - '.github/workflows/selenium.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/selenium-java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Maven tests
        run: mvn -B test -DfailIfNoTests=false
